title: DNSSEC Validation Failure Detected
id: 11-dnssec-failure-001
date: 2026-03-27
author: Angie Casarez
status: experimental
description: Detects DNSSEC validation failures
logsource:
  category: dns_response
  product: dns_resolver
detection:
  selection:
    DnssecStatus|contains:
      - "fail"
      - "invalid"
  condition: selection
level: medium
tags:
  - attack.t1557.004
  - dnssec
---

title: RPZ Blocklist Hit
id: 11-rpz-hit-001
date: 2026-03-27
author: Angie Casarez
status: experimental
description: Detects when queries are blocked by RPZ
logsource:
  category: dns_response
  product: dns_resolver
detection:
  selection:
    Action: blocked
    BlockListName|contains:
      - "abuse.ch"
      - "surbl"
  condition: selection
level: high
tags:
  - attack.t1590.002
  - malware
---

title: DNS Query Volume Anomaly Detected
id: 11-dns-volume-anomaly-001
date: 2026-03-27
author: Angie Casarez
status: experimental
description: Detects anomalous spikes in DNS query volume
logsource:
  category: dns_query
  product: dns_resolver
detection:
  selection:
    SrcIp: "*"
  condition: selection
level: medium
tags:
  - dns
  - anomaly_detection
---

title: DNS Resolver Configuration Changed
id: 11-resolver-config-change-001
date: 2026-03-27
author: Angie Casarez
status: experimental
description: Detects changes to DNS resolver configuration
logsource:
  category: process_modification
  product: dns_resolver
detection:
  selection:
    ProcessName|contains:
      - "named"
      - "dnsmasq"
  condition: selection
level: medium
tags:
  - dns
  - configuration
---

title: Unauthorized External Recursive DNS Query
id: 11-external-recursive-query-001
date: 2026-03-27
author: Angie Casarez
status: experimental
description: Detects recursive DNS queries from external sources
logsource:
  category: dns_query
  product: dns_resolver
detection:
  selection:
    QueryRecursionDesired: true
  condition: selection
level: medium
tags:
  - attack.t1590.002
  - reconnaissance

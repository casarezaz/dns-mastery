---
title: Plaintext DNS Query Detected
id: 11-dns-plaintext-001
date: 2026-03-27
author: Angie Casarez
status: experimental
description: Detects DNS queries over plaintext (port 53) instead of encrypted
logsource:
  category: dns_query
  product: dns_resolver
detection:
  selection:
    QueryProtocol|contains:
      - "udp"
    DestPort: 53
  condition: selection
level: medium
tags:
  - attack.t1071.004
  - dns
---

title: DNS Spoofing Attempt Detected
id: 11-dns-spoofing-001
date: 2026-03-27
author: Angie Casarez
status: experimental
description: Detects potential DNS spoofing
logsource:
  category: dns_response
  product: dns_resolver
detection:
  selection:
    QueryName: "*"
    ResponseCode: 0
  condition: selection
level: high
tags:
  - attack.t1557.004
  - dns
---

title: DGA Domain Query Detected
id: 11-dga-detection-001
date: 2026-03-27
author: Angie Casarez
status: experimental
description: Detects queries to high-entropy domains
logsource:
  category: dns_query
  product: dns_resolver
detection:
  selection:
    QueryName|re: "^[a-z0-9]{30,}\.(com|net|org|biz|info)$"
  condition: selection
level: high
tags:
  - attack.t1590.002
  - malware
---


title: DNS C2 - Encoded Subdomain Labels (Base32/Hex)
id: e5f6a7b8-c9d0-1234-efab-345678901234
status: experimental
description: |
    Detects DNS queries containing subdomain labels that match base32 or
    hexadecimal encoding patterns. DNS tunneling tools (iodine, dnscat2,
    dns2tcp) encode data in subdomain labels using these encodings to
    exfiltrate data or receive commands via DNS.
references:
    - https://attack.mitre.org/techniques/T1572/
    - https://attack.mitre.org/techniques/T1041/
author: Angie Casarez (casarezaz)
date: 2026/03/25
tags:
    - attack.command_and_control
    - attack.t1572
    - attack.exfiltration
    - attack.t1041
logsource:
    category: dns
    product: zeek
detection:
    selection_base32:
        query|re: '[A-Z2-7]{20,}\.'
    selection_hex:
        query|re: '[0-9a-f]{20,}\.'
    condition: selection_base32 or selection_hex
falsepositives:
    - DKIM key lookups with long selectors
    - Legitimate base32-encoded service identifiers
level: high

title: DNS C2 - Excessive TXT Record Queries
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: experimental
description: |
    Detects hosts sending an excessive number of TXT record queries to a
    single domain. TXT records can carry up to 255 bytes per string and are
    commonly abused by C2 frameworks to download commands and configuration
    from attacker-controlled DNS infrastructure.
references:
    - https://attack.mitre.org/techniques/T1071/004/
author: Angie Casarez (casarezaz)
date: 2026/03/25
tags:
    - attack.command_and_control
    - attack.t1071.004
    - attack.exfiltration
    - attack.t1041
logsource:
    category: dns
    product: zeek
detection:
    selection:
        qtype_name: 'TXT'
    filter_known_txt:
        query|contains:
            - '_dmarc.'
            - '_domainkey.'
            - '_spf.'
            - '_mta-sts.'
            - '_acme-challenge.'
    condition: selection and not filter_known_txt | count() by query > 5
    timeframe: 1h
falsepositives:
    - DMARC/DKIM/SPF record lookups (filtered)
    - Certificate validation
    - Service discovery
level: high

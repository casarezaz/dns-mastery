title: DNS C2 Beacon Detection - Periodic Query Intervals
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: experimental
description: |
    Detects hosts sending DNS queries to the same base domain at regular
    intervals, consistent with C2 beacon check-in behavior. Most C2 implants
    query their controller domain on a timer (e.g., every 60 seconds) with
    small random jitter to avoid exact-interval detection.
references:
    - https://attack.mitre.org/techniques/T1071/004/
author: Angie Casarez (casarezaz)
date: 2026/03/25
tags:
    - attack.command_and_control
    - attack.t1071.004
logsource:
    category: dns
    product: zeek
detection:
    selection:
        # Correlate by source IP — same host querying same domain repeatedly
        id.orig_h|count_gt: 10
    timeframe: 1h
    condition: selection
    # NOTE: This rule requires enrichment with interval analysis.
    # Sigma alone cannot compute inter-query intervals.
    # Use the companion SPL queries or dns_c2_detector.py for full
    # beacon interval analysis with coefficient of variation scoring.
falsepositives:
    - Heartbeat/health-check services
    - Monitoring agents querying status endpoints
    - Auto-update mechanisms
level: medium

title: DNS C2 - High NXDOMAIN Rate (DGA Indicator)
id: d4e5f6a7-b8c9-0123-defa-234567890123
status: experimental
description: |
    Detects hosts generating a high rate of NXDOMAIN responses, indicating
    Domain Generation Algorithm (DGA) activity. DGA-based malware generates
    many random domains and queries them sequentially — most return NXDOMAIN,
    but the few that resolve reach the attacker's C2 server.
references:
    - https://attack.mitre.org/techniques/T1568/002/
author: Angie Casarez (casarezaz)
date: 2026/03/25
tags:
    - attack.command_and_control
    - attack.t1568.002
logsource:
    category: dns
    product: zeek
detection:
    selection:
        rcode_name: 'NXDOMAIN'
    condition: selection | count() by id.orig_h > 50
    timeframe: 1h
falsepositives:
    - Misconfigured applications querying stale domains
    - DNS-based blocklists returning NXDOMAIN
    - Split-horizon DNS issues
level: high

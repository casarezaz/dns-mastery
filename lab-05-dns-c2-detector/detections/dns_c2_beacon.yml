title: DNS C2 Beacon Detection - High Entropy Subdomains
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: |
    Detects DNS queries with high-entropy subdomain labels, a strong indicator
    of DNS-based command-and-control communication. C2 tools encode commands
    and exfiltrated data in subdomain labels using base32, base64, or hex
    encoding, producing distinctively high Shannon entropy values.
references:
    - https://attack.mitre.org/techniques/T1071/004/
    - https://github.com/casarezaz/dns-mastery/tree/main/lab-05-dns-c2-detector
author: Angie Casarez (casarezaz)
date: 2026/03/25
modified: 2026/03/25
tags:
    - attack.command_and_control
    - attack.t1071.004
    - attack.t1572
    - attack.exfiltration
    - attack.t1041
logsource:
    category: dns
    product: zeek
detection:
    selection_long_labels:
        query|re: '^[a-z0-9\-\_]{24,}\.'
    filter_known_benign:
        query|endswith:
            - '.googleapis.com'
            - '.gstatic.com'
            - '.cloudfront.net'
            - '.akamaiedge.net'
            - '.cloudflare.com'
            - '.amazonaws.com'
            - '.windows.net'
            - '.office365.com'
            - '.microsoftonline.com'
            - '._domainkey.'
            - '._dmarc.'
            - '._acme-challenge.'
    condition: selection_long_labels and not filter_known_benign
falsepositives:
    - DKIM and SPF record lookups with long selectors
    - ACME certificate validation challenges
    - Legitimate CDN and cloud provider subdomains
    - Anti-spam verification tokens
level: high
